<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/jquery-2.1.3.min.js"></script>
    <script src="js/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>
    <main>
        <div id="addDataBox">
            <div id="addMemberBox">
                <h1>メンバー追加</h1>
                <div id="memberInputBox">
                    <input type="text" id="addMemberInput">
                    <button type="button" id="addMemberBtn" onclick="addMember()">追加</button>
                </div>
                <div id="displayMember">
                    メンバーリスト
                    <div id="displayMemberBox">
                        <table id="displayMemberTable">
                        </table>
                    </div>
                </div>
            </div>
            <div id="addHistoryBox">
                <h1>立て替え追加</h1>
                <div id="addHistoryMian">
                    <select id="addWhoInput">
                        <option value="" selected disabled>誰</option>
                    </select>が<br>
                    <div id="whoseBox"></div>
                    <div id="no">の</div>
                    <input type="text" id="addWhatInput" placeholder="タクシー代">を払って、<br>
                    <input type="text" id="addHowMuchInput" placeholder="いくら">かかった。<br>
                    <button type="button" id="addHistoryBtn" onclick="addHistory()">追加</button>
                </div>
            </div>
        </div>
        <div id="historyBox">
            <h1>立て替え一覧</h1>
            <div id="historyInBox"></div>
        </div>
        <div id="resultBox">
            <h1>清算方法</h1>
            <div id="result">
            </div>
            <div id="resetBox">
                画像タイトル：<input type="text" id="picTitleInput" placeholder="沖縄旅行_清算">.png<br>
                <button type="button" id="pictureBtn">清算方法のエクスポート</button><br>
                <button type="button" id="resetBtn" onclick="reset()">リセット</button>
            </div>
        </div>
    </main>




</body>

<script>
    window.onload = displayAllList();


    function displayAllList() {
        $('#displayMemberTable').empty();
        // 先頭以外の子要素を削除
        $("#addWhoInput").children().not(":first").remove();
        $('#whoseBox').empty();
        $('#historyInBox').empty();
        $('#result').empty();
        // メンバーリストの表示
        const disList = localStorage.getItem("memberList");

        // table取得
        const tbl = document.getElementById("displayMemberTable");
        if (disList) {
            let displayMemberList1 = JSON.parse(disList);
            for (let i = 0; i < displayMemberList1.length; i++) {
                //空の行要素を先に作成tr
                let tr = document.createElement("tr");

                let td = document.createElement("td");
                td.className = 'member';
                td.textContent = displayMemberList1[i];
                tr.appendChild(td);

                let tdBtn = document.createElement("td");
                tdBtn.className = 'tdBtn';
                tdBtn.textContent = displayMemberList1[i];
                tr.appendChild(td);

                //完成したtrをtableに追加
                tbl.appendChild(tr);
            }
        }

        // セレクトボックスの表示
        const selectWho = document.getElementById("addWhoInput");
        if (disList) {
            let displayMemberList2 = JSON.parse(disList);
            displayMemberList2.forEach((item, index) => {
                const option = document.createElement("option");
                option.value = item.value ?? `${index}`;
                option.textContent = item.label ?? String(item);
                selectWho.appendChild(option);
            });
        }


        // チェックボックスの表示
        const selectWhose = document.getElementById("whoseBox");
        if (disList) {
            let displayMemberList3 = JSON.parse(disList);
            displayMemberList3.forEach((item, index) => {
                const label = document.createElement("label");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = true;
                checkbox.name = "whose";
                checkbox.value = item;
                checkbox.id = `chk_${index}`;

                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(item));
                selectWhose.appendChild(label);
                selectWhose.appendChild(document.createElement("br"));
            });
        }

        // historyリストの表示
        const historyInBox = document.getElementById("historyInBox");
        const hisList = localStorage.getItem("historyList");
        if (hisList) {
            const historyList = JSON.parse(hisList);
            for (let i = 0; i < historyList.length; i++) {
                let hisBox = document.createElement("div");
                hisBox.className = "hisBox";

                let oneHistory = document.createElement("div");
                oneHistory.className = "oneHistory";

                let topDiv = document.createElement("div");
                topDiv.className = "topDiv";

                let divWho = document.createElement("div");
                divWho.className = 'divWho';
                divWho.textContent = historyList[i].who;
                topDiv.appendChild(divWho);

                let divWhat = document.createElement("div");
                divWhat.className = 'divWhat';
                divWhat.textContent = historyList[i].what;
                topDiv.appendChild(divWhat);

                let divHowMuch = document.createElement("div");
                divHowMuch.className = 'divHowMuch';
                divHowMuch.textContent = historyList[i].HowMuch + "円";
                topDiv.appendChild(divHowMuch);

                oneHistory.appendChild(topDiv);

                let bottomDiv = document.createElement("div");
                bottomDiv.className = "bottomDiv";
                bottomDiv.textContent = historyList[i].Whose;
                oneHistory.appendChild(bottomDiv);

                hisBox.appendChild(oneHistory);


                let hisBtnBox = document.createElement("div");
                hisBtnBox.className = "hisBtnBox";

                let divFixBtn = document.createElement("button");
                divFixBtn.id = 'divFixBtn';
                divFixBtn.type = "button";
                divFixBtn.textContent = "修\n正";
                divFixBtn.addEventListener("click", () => {
                    fix(i);
                });
                hisBtnBox.appendChild(divFixBtn);

                let divDelBtn = document.createElement("button");
                divDelBtn.id = 'divDelBtn';
                divDelBtn.type = "button";
                divDelBtn.textContent = "削\n除";
                divDelBtn.addEventListener("click", () => {
                    del(i);
                });
                hisBtnBox.appendChild(divDelBtn);

                hisBox.appendChild(hisBtnBox);

                historyInBox.appendChild(hisBox);
            }
        }

        // 決算方法の表示
        if (hisList) {
            const getResult = document.getElementById("result");
            const resultList = calculate();
            for (let i = 0; i < resultList.length; i++) {
                let oneResult = document.createElement("div");
                if (i % 2 == 0) {
                    oneResult.className = "oneResult1";
                } else {
                    oneResult.className = "oneResult2";
                }


                let divFrom = document.createElement("div");
                divFrom.className = 'divFrom';
                divFrom.textContent = resultList[i].from;
                oneResult.appendChild(divFrom);

                let divY = document.createElement("div");
                divY.className = 'divY';
                divY.textContent = "⇒";
                oneResult.appendChild(divY);

                let divTo = document.createElement("div");
                divTo.className = 'divTo';
                divTo.textContent = resultList[i].to;
                oneResult.appendChild(divTo);

                let divAmount = document.createElement("div");
                divAmount.className = 'divAmount';
                divAmount.textContent = resultList[i].amount + "円";
                oneResult.appendChild(divAmount);

                getResult.appendChild(oneResult);
            }
        }
    }

    function del(index) {
        const hisList = localStorage.getItem("historyList");
        const historyList = JSON.parse(hisList);
        historyList.splice(index, 1);
        localStorage.setItem("historyList", JSON.stringify(historyList));
        displayAllList();
    }

    function addMember() {
        const getNewMember = document.getElementById("addMemberInput");
        const newMember = getNewMember.value;
        getNewMember.value = "";

        const list = localStorage.getItem("memberList");
        if (list) {
            const memberList = JSON.parse(list);
            memberList.push(newMember);
            localStorage.setItem("memberList", JSON.stringify(memberList));
        } else {
            const newList = [];
            newList.push(newMember);
            localStorage.setItem("memberList", JSON.stringify(newList));
        }
        displayAllList();
    }

    function addHistory() {
        const getWho = document.getElementById("addWhoInput");
        const newWhoIndex = getWho.value;

        const getDMList = localStorage.getItem("memberList");
        const dMList = JSON.parse(getDMList);
        const newWho = dMList[newWhoIndex];


        // name="whose" かつ checked の要素を取得
        const checkedBoxes = document.querySelectorAll('input[name="whose"]:checked');
        // 値を配列に変換
        const whoseList = Array.from(checkedBoxes).map(cb => cb.value);
        const whoseText = whoseList.join(',');

        if (!whoseList) {
            return alert("誰も選択されていません。");
        }

        const getWhat = document.getElementById("addWhatInput");
        const newWhat = getWhat.value;

        const getHowMuch = document.getElementById("addHowMuchInput");
        const newHowMuch = getHowMuch.value;
        if (!newHowMuch.match(/^[0-9]+$/)) {
            return alert("0～9の半角数字を入力してください");
        }

        const newHistory = {
            who: newWho,
            what: newWhat,
            HowMuch: newHowMuch,
            Whose: whoseText
        }

        const list = localStorage.getItem("historyList");
        if (list) {
            const historyList = JSON.parse(list);
            historyList.push(newHistory);
            localStorage.setItem("historyList", JSON.stringify(historyList));
        } else {
            const newList = [];
            newList.push(newHistory);
            localStorage.setItem("historyList", JSON.stringify(newList));
        }

        getWho.selectedIndex = 0;
        const checkboxes = document.querySelectorAll('input[name="whose"]');
        checkboxes.forEach(cb => {
            cb.checked = true; // 初期状態に戻す
        });
        getWhat.value = "";
        getHowMuch.value = "";
        displayAllList()
        calculate()

    }

    function calculate() {
        const expenses = [];

        const hisList = localStorage.getItem("historyList");
        if (hisList) {
            const historyList = JSON.parse(hisList);
            for (let i = 0; i < historyList.length; i++) {
                const str = historyList[i].Whose;
                const array = str.split(",");
                const newEx = { payer: historyList[i].who, amount: parseInt(historyList[i].HowMuch, 10), beneficiaries: array }
                expenses.push(newEx);
            }

            const balances = {};

            // 1. 各人の支払額と負担額を計算
            expenses.forEach(exp => {
                if (typeof exp.amount !== "number" || exp.amount <= 0) {
                    throw new Error(`不正な金額: ${JSON.stringify(exp)}`);
                }
                if (!Array.isArray(exp.beneficiaries) || exp.beneficiaries.length === 0) {
                    throw new Error(`beneficiaries が空です: ${JSON.stringify(exp)}`);
                }

                const share = exp.amount / exp.beneficiaries.length;

                // 支払った人の残高を加算
                balances[exp.payer] = (balances[exp.payer] || 0) + exp.amount;

                // 恩恵を受けた人の残高を減算
                exp.beneficiaries.forEach(person => {
                    balances[person] = (balances[person] || 0) - share;
                });
            });

            // 2. プラス組とマイナス組に分ける
            let creditors = Object.entries(balances)
                .filter(([_, bal]) => bal > 0)
                .map(([name, bal]) => ({ name, balance: +bal.toFixed(2) }))
                .sort((a, b) => b.balance - a.balance);

            let debtors = Object.entries(balances)
                .filter(([_, bal]) => bal < 0)
                .map(([name, bal]) => ({ name, balance: +bal.toFixed(2) }))
                .sort((a, b) => a.balance - b.balance);

            const transactions = [];

            // 3. マッチング（Greedy）
            while (creditors.length && debtors.length) {
                let creditor = creditors[0];
                let debtor = debtors[0];

                const amount = Math.min(creditor.balance, -debtor.balance);

                transactions.push({
                    from: debtor.name,
                    to: creditor.name,
                    amount: +amount.toFixed(2)
                });

                creditor.balance -= amount;
                debtor.balance += amount;

                if (Math.abs(creditor.balance) < 0.01) creditors.shift();
                if (Math.abs(debtor.balance) < 0.01) debtors.shift();

                creditors.sort((a, b) => b.balance - a.balance);
                debtors.sort((a, b) => a.balance - b.balance);
            }
            return transactions;
        }
    }

    document.getElementById("pictureBtn").addEventListener("click", function () {
        const target = document.getElementById("result");
        const getTitle = document.getElementById("picTitleInput");
        if (getTitle.value == "") {
            return alert("画像タイトルを入力してください");
        }
        const title = getTitle.value + ".png";
        getTitle.value = "";

        // html2canvasで要素を画像化
        html2canvas(target, { scale: 2 })
            .then(canvas => {
                const dataURL = canvas.toDataURL("image/png");
                const link = document.createElement("a");
                link.href = dataURL;
                link.download = title;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            })
            .catch(err => {
                console.error("キャプチャに失敗しました:", err);
                alert("画像保存に失敗しました。");
            });


    })






    function reset() {
        localStorage.clear();
        $('#displayMemberTable').empty();
        // 先頭以外の子要素を削除
        $("#addWhoInput").children().not(":first").remove();
        $('#whoseBox').empty();
        displayAllList();
    }




</script>

</html>
