<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/jquery-2.1.3.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>Hit & Blow</h1>
    </header>

    <main>
        <div>
            <button id="startBtn" type="button" style="display: block;" onclick="startGame()">ゲームスタート</button>
            <button id="stopBtn" type="button" style="display: none;" onclick="stopGame()">ゲーム終了</button>
        </div>

        <div id="gameMain">
            <div>
                <div id="result">
                    <div id="winLeft">win</div>
                    <div id="loseRight">Lose</div>
                    <div id="drawLeft">Draw</div>
                    <div id="countDownLeft" style="display: none;">
                        <div id="timeLeft">00:00</div>
                    </div>
                </div>
                <div id="leftPlayer">
                    <h2 id="leftHead">Player1</h2>
                    <form name="leftForm">
                        <input type="text" id="inputLeft" maxlength="4" value=""><br>
                        <button type="button" id="btnLeft" onclick="check('Left')"> 回答</button>
                    </form>
                </div>
            </div>
            <div id="guessLog">
                <table id="logTable">
                    <thead>
                        <tr class="hr">
                            <th class="b" style="width: 150px;">player</th>
                            <th class="b" style="width: 150px;">number</th>
                            <th class="b" style="width: 100px;">Hit</th>
                            <th style="width: 100px;">Blow</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div>
                <div id="result">
                    <div id="winRight">win</div>
                    <div id="loseLeft">Lose</div>
                    <div id="drawRight">Draw</div>
                    <div id="countDownRight" style="display: none;">
                        <div id="timeRight">00:00</div>
                    </div>
                </div>
                <div id="rightPlayer">
                    <h2 id="rightHead">Player2</h2>
                    <form name="rightForm">
                        <input type="text" id="inputRight" maxlength="4" value=""><br>
                        <button type="button" id="btnRight" onclick="check('Right')"> 回答</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>

<script>
    let answer = [];
    let gameActive = false;
    const tbl = document.getElementById("tableBody");
    let stopTimer;
    let time;
    let targetTime;

    function startGame() {
        answer = [];
        console.log("スタートボタンが押された");
        const num = ["1", "2", "3", "4", "5", "6", "7", "8", "9"];
        while (answer.length < 4) {
            const index = num[Math.ceil(Math.random() * num.length - 1)];
            if (!answer.includes(index)) {
                answer.splice(1, 0, index);
            }
        }
        console.log("正解：" + answer);

        gameActive = true;

        $('#tableBody').empty();

        document.getElementById("countDownLeft").style.display = "block";
        document.getElementById("countDownRight").style.display = "none";
        document.getElementById("winLeft").style.display = "none";
        document.getElementById("loseLeft").style.display = "none";
        document.getElementById("winRight").style.display = "none";
        document.getElementById("loseRight").style.display = "none";
        document.getElementById("drawLeft").style.display = "none";
        document.getElementById("drawRight").style.display = "none";
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "block";
        timer("Left");
    }

    function stopGame() {
        gameActive = false;
        document.getElementById("drawLeft").style.display = "block";
        document.getElementById("drawRight").style.display = "block";
        document.getElementById("startBtn").style.display = "block";
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("countDownLeft").style.display = "none";
        document.getElementById("countDownRight").style.display = "none";
    }

    function check(side) {
        if (!gameActive) {
            return alert("スタートボタンを押してね！");
        }

        const getEl = document.getElementById(`input${side}`);
        console.log(getEl);
        let number = getEl.value;

        if (number.length != 4) {
            return alert("4桁の数字を入力してね！");
        }

        const chars = number.split(""); // 1文字ごとに分割

        let hit = 0;
        let blow = 0;
        const blowLog = [];
        const blowNum = [];

        for (let i = 0; i < 4; i++) {
            if (chars[i] == answer[i]) {
                hit++;
            } else {
                blowLog.splice(1, 0, i);
            }
        }

        for (let i of blowLog) {
            for (let j of blowLog) {
                if (i != j && chars[i] == answer[j] && !blowNum.includes(chars[i])) {
                    blow++;
                    blowNum.splice(1, 0, chars[i]);
                }
            }
        }


        addTable(side, number, hit, blow)
        getEl.value = "";

        if (hit == 4) {
            document.getElementById(`win${side}`).style.display = "block";
            document.getElementById(`lose${side}`).style.display = "block";
            document.getElementById("startBtn").style.display = "block";
            document.getElementById("stopBtn").style.display = "none";
            document.getElementById("countDownLeft").style.display = "none";
            document.getElementById("countDownRight").style.display = "none";
            gameActive = false;
        } else {
            clearInterval(interval);
            document.getElementById(`countDown${side}`).style.display = "none";
            if (side == "Left") {
                document.getElementById("countDownRight").style.display = "block";
                timer("Right");
            } else {
                document.getElementById("countDownLeft").style.display = "block";
                timer("Left");
            }
        }

    }

    function addTable(side, number, hit, blow) {

        //空の行要素を先に作成tr
        let tr = document.createElement("tr");
        tr.className = 'r';
        tr.id = 'rId';


        let tdP = document.createElement("td");
        tdP.className = 'b';
        tdP.textContent = side;        //tdにinpを追加
        tr.appendChild(tdP);         //trにtdを追加

        let tdN = document.createElement("td");      //新しいtd要素を作って変数tdに格納
        tdN.className = 'b';
        tdN.textContent = number;        //tdにinpを追加
        tr.appendChild(tdN);         //trにtdを追加            

        let tdH = document.createElement("td");      //新しいtd要素を作って変数tdに格納
        tdH.className = 'b';
        tdH.textContent = hit;        //tdにinpを追加
        tr.appendChild(tdH);         //trにtdを追加

        let tdB = document.createElement("td");      //新しいtd要素を作って変数tdに格納
        tdB.textContent = blow;        //tdにinpを追加
        tr.appendChild(tdB);         //trにtdを追加

        //完成したtrをtableに追加
        tbl.appendChild(tr);
    }

    function updateCountDown(side) {
        const now = new Date().getTime();
        const distance = targetTime - now;

        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        console.log("い" + time);

        time.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

        if (distance < 0) {

            clearInterval(interval);
            document.getElementById(`countDown${side}`).style.display = "none";
            if (side == "Left") {
                document.getElementById("countDownRight").style.display = "block";
                timer("Right");
            } else {
                document.getElementById("countDownLeft").style.display = "block";
                timer("Left");
            }
        }
    }

    function timer(side) {
        time = document.getElementById(`time${side}`);
        targetTime = new Date().getTime() + 8000;
        console.log("あ" + time);

        interval = setInterval(updateCountDown, 1000);
        updateCountDown(side);
    }


</script>

</html>
