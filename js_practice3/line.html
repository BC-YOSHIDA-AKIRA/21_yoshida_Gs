<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Firebase:v9:Chatアプリ</title>
    <script src="js/firebaseConfig.js"></script>
</head>

<body>
    <audio id="post" src="img/post.mp3"></audio>

    <!-- コンテンツ表示画面 -->

    <div>
        <div id="head">
            <div id="imageFrameTop" class="circle-frame"></div>
            <select id="imageSelect">
                <option value="img/kora.png" selected style="background-color: #ff3c3c;"><span>コラショ</span></option>
                <option value="img/shima.png" style="background-color: #ffc001;"><span>しまじろう</span></option>
            </select>
        </div>
        <div id="output"></div>

        <div id="stampBoxKora">
            <div class="stampList">
                <img class="image" src="img/koraHappy.png">
                <img class="image" src="img/koraGood.png">
                <img class="image" src="img/koraSad.png">
            </div>
        </div>
        <div id="stampBoxShima">
            <div class="stampList">
                <img class="image" src="img/shimaHappy.png">
                <img class="image" src="img/shimaGood.png">
                <img class="image" src="img/shimaSad.png">
            </div>
        </div>
        <div id="inputBox">
            <div id="imageFrameBottom" class="circle-frame"></div>
            <div id="textBox"><textarea id="text"></textarea></div>
            <img id="stamp" src="img/stamp.png"></img>
            <img id="send" src="img/send.png"></img>
        </div>

    </div>
    <!--/ コンテンツ表示画面 -->

    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- JQuery -->


    <!--** 以下Firebase **-->
    <script type="module">
        // ==========================================
        // 1. Firebase 初期化・参照設定
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onChildChanged, remove, onChildRemoved, get, query, update }
            from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); // RealtimeDatabase使うよ
        const dbRef = ref(db, "chat"); // RealtimeDatabase”chat“を使うよ


        // ==========================================
        // 2. DOM要素の取得
        // ==========================================
        const select = document.getElementById('imageSelect');
        const frameTop = document.getElementById('imageFrameTop');
        const frameBottom = document.getElementById('imageFrameBottom');
        const textBack = document.getElementById('output');
        const headBack = document.getElementById('head');
        const inputBack = document.getElementById('inputBox');
        const selectBack = document.getElementById('imageSelect');

        // 1. キャラクター設定
        const CHARA_MAP = {
            "img/kora.png": { name: "shima", class: "shima" },
            "img/shima.png": { name: "kora", class: "kora" }
        };


        // ==========================================
        // 3. ユーティリティ関数
        // ==========================================

        /** 現在時刻を HH:mm 形式で取得する */
        function getNowTime() {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        /** チャット画面を一番下までスクロールする */
        function pageScroll() {
            setTimeout(() => {
                const target = document.getElementById("output");
                if (target) target.scrollTop = target.scrollHeight;
            }, 100);
        }

        /** 画面のテーマカラーと背景画像を切り替える */
        function change(value) {
            const isKora = (value === "img/kora.png");
            frameTop.style.backgroundImage = `url(${value})`;
            frameBottom.style.backgroundImage = isKora ? "url(img/shima.png)" : "url(img/kora.png)";
            textBack.style.backgroundImage = isKora ? "url(img/shimaBack.png)" : "url(img/koraBack.png)";
            const color = isKora ? "#ffc001" : "#ff3c3c";
            headBack.style.backgroundColor = inputBack.style.backgroundColor = selectBack.style.backgroundColor = color;
        }


        // ==========================================
        // 4. チャット描画・メッセージ処理
        // ==========================================

        /** メッセージHTMLを生成する */
        function createHtml(msg, charaClass, isRight) {
            const readStatus = msg.read === 1 ? "既読" : " ";
            const timeClass = isRight ? "time" : "timeLeft";
            const alignClass = isRight ? "divRight" : "divLeft";
            const bubbleClass = isRight ? `bg ${charaClass} right` : `bg ${charaClass} left`;
            const content = msg.type === 0 ? `<p class="${bubbleClass}">${msg.text}</p>` : `<img class="displayStamp" src="${msg.text}">`;

            return isRight
                ? `<div class="${alignClass}"><div><p class="read">${readStatus}</p><p class="${timeClass}">${msg.sendTime}</p></div>${content}</div>`
                : `<div class="${alignClass}">${content}<p class="${timeClass}">${msg.sendTime}</p></div>`;
        }

        /** メッセージを送信しFirebaseへ保存する */
        function sendMessage(type, content) {
            const msg = {
                imageSelect: $("#imageSelect").val(),
                sendTime: getNowTime(),
                read: 0,
                type: type,
                text: content
            };
            set(push(dbRef), msg);
            const audio = document.getElementById("post");
            audio.currentTime = 0;
            audio.play();
        }


        /** 個別のメッセージを表示・既読更新する */
        function displayText(data) {
            const msg = data.val();
            const key = data.key;
            const isMyMessage = (msg.imageSelect === select.value);
            const chara = CHARA_MAP[msg.imageSelect];

            $("#output").append(createHtml(msg, chara.class, isMyMessage));

            if (!isMyMessage && msg.read === 0) {
                update(ref(db, "chat/" + key), { read: 1 });
            }
            pageScroll();
        }

        /** チャット全体を再描画する */
        function renderChat() {
            $("#output").empty();

            get(dbRef).then((snapshot) => {
                snapshot.forEach((data) => {
                    displayText(data);
                });
                pageScroll();
            });
        }

        // ==========================================
        // 5. イベントリスナー・初期化
        // ==========================================

        window.onload = () => change(select.value);

        select.addEventListener('change', function () {
            change(this.value);
            renderChat();
        });

        //送信イベント
        $("#send").on("click", function () {
            if (text === "") return;
            sendMessage(0, $("#text").val());
            document.getElementById('text').value = "";
        });

        document.querySelectorAll(".image").forEach(img => {
            img.addEventListener("click", event => {
                sendMessage(1, event.target.getAttribute("src"));
                const box = ($("#imageSelect").val() === "img/kora.png") ? "stampBoxShima" : "stampBoxKora";
                document.getElementById(box).style.display = "none";
            });
        });

        $("#stamp").on("click", () => {
            const box = (select.value === "img/kora.png") ? "stampBoxShima" : "stampBoxKora";
            document.getElementById(box).style.display = "block";
        });

        // Firebase 監視
        onChildAdded(dbRef, displayText);
        onChildChanged(dbRef, renderChat);
    </script>

</body>

</html>
